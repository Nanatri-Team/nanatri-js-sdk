<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nanatri</title>
  <link rel="stylesheet" href="/frames/form/style.css" />
  <script src="/frames/shared/locales/en.js"></script>
  <script src="/frames/shared/locales/ka.js"></script>
</head>
<body>
  <div class="modal-inner">

    <div class="modal-header">
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="ka" type="button">KA</button>
      </div>
      <button id="close-btn" class="close-btn" type="button" aria-label="Close">&#x2715;</button>
    </div>

    <div class="slider-wrapper">
      <div class="slider" id="slider">

        <!-- Screen 1: Phone -->
        <div class="slide">
          <h2 class="title" id="screen-title">Welcome back</h2>
          <p class="subtitle" id="screen-subtitle">Enter your phone number to continue</p>

          <!-- Phone combo field -->
          <div class="phone-field" id="phone-field">
            <label class="field-label" for="phone-number-input" id="phone-label">PHONE NUMBER</label>
            <div class="phone-combo" id="phone-combo">
              <button id="country-btn" class="country-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="country-flag" class="country-flag"></span>
                <span id="country-dial" class="country-dial"></span>
                <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div class="combo-divider"></div>
              <input id="phone-number-input" class="phone-number-input" type="tel" inputmode="numeric" placeholder="599 000 000" autocomplete="tel-national" />
            </div>

            <!-- Country dropdown -->
            <div id="country-dropdown" class="country-dropdown" hidden>
              <div class="dropdown-search-wrap">
                <input id="country-search" class="dropdown-search" type="text" placeholder="Search country..." autocomplete="off" spellcheck="false" />
              </div>
              <ul id="country-list" class="country-list" role="listbox"></ul>
            </div>

            <span class="field-error" id="err-phone"></span>
          </div>

          <button id="phone-submit" class="btn-primary" type="button">Continue</button>

          <div class="divider">
            <span id="or-text">or continue with</span>
          </div>

          <div class="social-btns">
            <button id="google-btn" class="btn-social btn-social--google" type="button">
              <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              <span class="social-label" id="google-label">Continue with Google</span>
            </button>
            <button id="facebook-btn" class="btn-social btn-social--facebook" type="button">
              <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#fff"/>
              </svg>
              <span class="social-label" id="facebook-label">Continue with Facebook</span>
            </button>
          </div>
        </div>

        <!-- Screen 2: OTP -->
        <div class="slide">
          <button id="back-btn" class="back-btn" type="button">&#8592; Back</button>
          <h2 class="title" id="otp-title">Enter the code</h2>
          <p class="subtitle"><span id="sent-to-text">Sent to</span> <strong id="phone-display"></strong></p>
          <div class="otp-boxes">
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
          </div>
          <span class="field-error" id="err-otp"></span>
          <div class="otp-footer">
            <button id="otp-submit" class="btn-primary" type="button">Verify</button>
            <button id="resend-btn" class="btn-resend" type="button" disabled>Resend in 30s</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="/frames/form/bundle.js"></script>
</body>
</html>
