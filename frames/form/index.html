<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nanatri</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="modal-inner">

    <div class="modal-header">
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="ka" type="button">KA</button>
      </div>
      <button id="close-btn" class="close-btn" type="button" aria-label="Close">&#x2715;</button>
    </div>

    <div class="slider-wrapper">
      <div class="slider" id="slider">

        <!-- Screen 1: Phone -->
        <div class="slide">
          <h2 class="title">Welcome back</h2>
          <p class="subtitle">Enter your phone number to continue</p>
          <div class="field">
            <label class="field-label" for="phone-input">PHONE NUMBER</label>
            <input id="phone-input" class="input" type="tel" placeholder="599 33 33 33" autocomplete="tel" />
            <span class="field-error" id="err-phone"></span>
          </div>
          <button id="phone-submit" class="btn-primary" type="button">Continue</button>
        </div>

        <!-- Screen 2: OTP -->
        <div class="slide">
          <button id="back-btn" class="back-btn" type="button">&#8592; Back</button>
          <h2 class="title">Enter the code</h2>
          <p class="subtitle">Sent to <strong id="phone-display"></strong></p>
          <div class="otp-boxes">
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
            <input type="tel" maxlength="1" class="otp-box" />
          </div>
          <button id="otp-submit" class="btn-primary" type="button">Verify</button>
        </div>

      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
